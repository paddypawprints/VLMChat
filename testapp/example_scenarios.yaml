image_settings:
  width: 1920
  height: 1080

scenarios:
  # --- STANDARD ACTIVITY (Crowded) ---
  - id: std_ride_bike_crowded
    type: standard
    environment:
      time: "day"
      weather: "sunny"
      lighting: "high contrast shadows"
    prompt: "Daytime CCTV close-up view of a person riding a bicycle on pavement, crowded street with pedestrians"
    entities:
      - id: obj_person
        label: person
        description: "person riding a bicycle, with dark skin and black hair, wearing green shorts and a blue t-shirt"
        size: large
        position: center
      - id: obj_bike
        label: bicycle
        size: large
        relation:
          type: overlap
          target: obj_person
          strength: 0.8
      # Distractor 1: Walker nearby
      - id: bg_walker_1
        label: person
        description: "person walking, wearing a grey suit"
        size: medium
        position: left_center
      # Distractor 2: Dog walker
      - id: bg_walker_2
        label: person
        description: "person walking a dog, wearing red dress"
        size: medium
        position: background_right
      - id: bg_dog
        label: dog
        size: small
        relation:
          type: adjacent
          target: bg_walker_2
          distance: close

    expected_outcome:
      clusters:
        - id: cluster_main
          location: center
          members: ["obj_person", "obj_bike"]
        - id: cluster_walker_1
          location: left_center
          members: ["bg_walker_1"]
        - id: cluster_walker_dog
          location: background_right
          members: ["bg_walker_2", "bg_dog"]
      matches:
        - query: "person riding bicycle"
          type: relationship
          target_id: "cluster_main"
        - query: "blue t-shirt"
          type: attribute
          target_id: "obj_person"
        - query: "person walking dog"
          type: relationship
          target_id: "cluster_walker_dog"
          
  # --- SECURITY EVENT (Vandalism) ---
  - id: sec_vandalism_group
    type: security
    environment:
      time: "night"
      weather: "foggy"
      lighting: "hazey streetlights"
    prompt: "Night CCTV view of a group surrounding a car, one person hitting it with a bat"
    entities:
      - id: obj_car
        label: car
        size: large
        position: center
      - id: obj_attacker
        label: person
        description: "person swinging bat, wearing a ski mask"
        size: medium
        relation:
          type: adjacent
          target: obj_car
          distance: touching
      - id: obj_weapon
        label: baseball bat
        size: small
        relation:
          type: contains
          target: obj_attacker
      # Accomplices / Witnesses
      - id: bg_person_1
        label: person
        description: "person watching, wearing hood"
        size: medium
        relation:
          type: adjacent
          target: obj_attacker
          distance: close
      - id: bg_person_2
        label: person
        description: "person standing by car door"
        size: medium
        relation:
          type: overlap
          target: obj_car

    expected_outcome:
      clusters:
        - id: cluster_attack
          location: center
          members: ["obj_attacker", "obj_weapon", "obj_car"]
        - id: cluster_group
          location: center
          members: ["bg_person_1", "bg_person_2", "obj_car"] 
          # They are related to the car, but maybe not the weapon directly
      matches:
        - query: "person hitting car with bat"
          type: relationship
          target_id: "cluster_attack"
        - query: "ski mask"
          type: attribute
          target_id: "obj_attacker"
