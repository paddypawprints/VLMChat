components:
  parameters:
    DeviceId:
      name: deviceId
      in: path
      required: true
      description: Device unique identifier
      schema:
        type: string

  schemas:
    User:
      type: object
      required: [id, email, name, createdAt]
      properties:
        id:
          type: string
          format: uuid
        email:
          type: string
          format: email
        name:
          type: string
        provider:
          oneOf:
            - type: string
              enum: [google, github, email]
            - type: 'null'
        providerId:
          oneOf:
            - type: string
            - type: 'null'
        createdAt:
          type: string
          format: date-time

    Device:
      type: object
      description: |
        Device runtime state and identity.
        Lightweight response schema for device queries.
      required: [deviceId, name, status, createdAt]
      properties:
        deviceId:
          type: string
          description: Unique device identifier
        name:
          type: string
          description: Human-friendly device name
        status:
          type: string
          enum: [connected, disconnected, connecting, error]
          description: Current connection status
        userId:
          oneOf:
            - type: string
              format: uuid
            - type: 'null'
          description: Owner user ID (null if unclaimed)
        lastSeen:
          oneOf:
            - type: string
              format: date-time
            - type: 'null'
          description: Last activity timestamp
        createdAt:
          type: string
          format: date-time
          description: Device creation timestamp

    DeviceCreate:
      description: |
        Admin device registration payload.
        Full hardware specification provided during manufacturing/provisioning.
      allOf:
        - $ref: '../schemas/register-v1.0.0.json'

    DeviceMessage:
      type: object
      required: [id, deviceId, topic, payload, createdAt]
      properties:
        id:
          type: string
          format: uuid
        deviceId:
          type: string
        topic:
          type: string
          description: MQTT topic
        payload:
          type: object
          description: Message payload
        qos:
          type: string
          enum: ['0', '1', '2']
        retained:
          type: boolean
        createdAt:
          type: string
          format: date-time

    ChatMessage:
      type: object
      required: [id, userId, role, content, createdAt]
      properties:
        id:
          type: string
          format: uuid
        userId:
          type: string
          format: uuid
        deviceId:
          oneOf:
            - type: string
              format: uuid
            - type: 'null'
        role:
          type: string
          enum: [user, assistant]
        content:
          type: string
        images:
          type: array
          items:
            type: string
        debug:
          oneOf:
            - type: object
            - type: 'null'
        createdAt:
          type: string
          format: date-time

    SearchTerm:
      description: User-defined search term with parsed filter configuration
      allOf:
        - $ref: '../schemas/search-term-v1.0.0.json'

    DetectionAudit:
      description: Audit log entry for detection that matched a search term
      allOf:
        - $ref: '../schemas/detection-audit-v1.0.0.json'
    
    DeviceConfig:
      description: Database record for device configuration with version tracking
      allOf:
        - $ref: '../schemas/device-config-v1.0.0.json'
    
    FrameworkConfig:
      description: Database record for framework configuration with version tracking
      allOf:
        - $ref: '../schemas/framework-config-v1.0.0.json'
    
    ConfigHistory:
      description: Audit record for configuration changes
      allOf:
        - $ref: '../schemas/config-history-v1.0.0.json'

  responses:
    InternalError:
      description: Internal server error
      content:
        application/json:
          schema:
            type: object
            properties:
              error:
                type: string
              details:
                type: string
    
    BadRequest:
      description: Invalid request data
      content:
        application/json:
          schema:
            type: object
            properties:
              error:
                type: string
              message:
                type: string
              details:
                type: array
                items:
                  type: object
    
    Unauthorized:
      description: Authentication required
      content:
        application/json:
          schema:
            type: object
            properties:
              error:
                type: string
                example: "Unauthorized"
              message:
                type: string
                example: "Authentication required"
    
    NotFound:
      description: Resource not found
      content:
        application/json:
          schema:
            type: object
            properties:
              error:
                type: string
              message:
                type: string
    
    Forbidden:
      description: Access denied
      content:
        application/json:
          schema:
            type: object
            properties:
              error:
                type: string
                example: "Access denied"
              message:
                type: string
  
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      description: JWT session token from cookie-based authentication
