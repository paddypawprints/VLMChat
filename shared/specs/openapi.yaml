# ⚠️  SECURITY CRITICAL - DO NOT MODIFY WITHOUT REVIEW
# This API specification is enforced by automated validation middleware.
# Changes to this file directly impact:
#   - Express OpenAPI validator middleware (index.ts) - validates ALL REST API requests
#   - Server startup - fails if spec is invalid (fail-fast security)
#   - API route definitions must match this spec exactly
#   - Referenced schemas must exist and be correct
# All modifications must be coordinated with route handlers and tested thoroughly.
# Invalid spec will cause server to crash on startup (intentional security measure).
# Unauthorized changes can create security vulnerabilities or break API functionality.

openapi: 3.1.0
info:
  title: Edge AI Platform API
  version: 1.0.0
  description: |
    REST API for the Edge AI Platform web management interface.
    Provides device management, chat, and metrics access.
  contact:
    name: VLMChat Platform
  license:
    name: MIT

servers:
  - url: http://localhost:5000
    description: Local development server
  - url: http://localhost:3000
    description: Docker development server

security:
  - bearerAuth: []

tags:
  - name: auth
    description: Authentication endpoints
  - name: devices
    description: Device management
  - name: admin
    description: Administrative endpoints (device and service management)
  - name: chat
    description: Chat with AI models
  - name: schemas
    description: JSON schema metadata
  - name: metrics
    description: Device metrics and monitoring
  - name: search
    description: Search terms and detection audit logs

paths:
  /api/auth/login:
    post:
      tags: [auth]
      summary: Login or register user
      description: Authenticate user with email. Creates new user if doesn't exist.
      operationId: login
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [email]
              properties:
                email:
                  type: string
                  format: email
                  example: user@example.com
                name:
                  type: string
                  example: John Doe
      responses:
        '200':
          description: Login successful
          content:
            application/json:
              schema:
                type: object
                properties:
                  user:
                    $ref: '#/components/schemas/User'
        '500':
          $ref: '#/components/responses/InternalError'

  /api/auth/me:
    get:
      tags: [auth]
      summary: Get current user
      description: Returns currently authenticated user or null
      operationId: getCurrentUser
      responses:
        '200':
          description: Current user info
          content:
            application/json:
              schema:
                type: object
                properties:
                  user:
                    oneOf:
                      - $ref: '#/components/schemas/User'
                      - type: "null"

  /api/auth/logout:
    post:
      tags: [auth]
      summary: Logout user
      operationId: logout
      responses:
        '200':
          description: Logout successful
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean

  /api/devices:
    get:
      tags: [devices]
      summary: List all devices
      description: Get all edge devices registered to the current user
      operationId: listDevices
      parameters:
        - name: status
          in: query
          description: Filter devices by status
          required: false
          schema:
            type: string
            enum: [active, connected, all]
      responses:
        '200':
          description: List of devices
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Device'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '500':
          $ref: '#/components/responses/InternalError'
    
    post:
      tags: [devices]
      summary: Register new device
      description: Create a new edge device registration
      operationId: createDevice
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/DeviceCreate'
      responses:
        '200':
          description: Device created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Device'
        '500':
          $ref: '#/components/responses/InternalError'

  /api/devices/{deviceId}:
    get:
      tags: [devices]
      summary: Get device by ID
      description: Retrieve a specific device by its ID
      operationId: getDevice
      parameters:
        - $ref: '#/components/parameters/DeviceId'
      responses:
        '200':
          description: Device details
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Device'
        '404':
          description: Device not found
          content:
            application/json:
              schema:
                type: object
                properties:
                  error:
                    type: string
        '500':
          $ref: '#/components/responses/InternalError'
    
    delete:
      tags: [devices]
      summary: Delete device
      description: Remove a device registration
      operationId: deleteDevice
      parameters:
        - $ref: '#/components/parameters/DeviceId'
      responses:
        '200':
          description: Device deleted
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
        '500':
          $ref: '#/components/responses/InternalError'

  /api/devices/{deviceId}/messages:
    get:
      tags: [devices]
      summary: Get device messages
      description: Retrieve MQTT messages from a specific device
      operationId: getDeviceMessages
      parameters:
        - $ref: '#/components/parameters/DeviceId'
      responses:
        '200':
          description: Device messages
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/DeviceMessage'
        '500':
          $ref: '#/components/responses/InternalError'

  /api/config/device:
    get:
      tags: [devices]
      summary: Get device type configuration
      description: Retrieve the active configuration for a device type (e.g., macos, raspberry-pi, jetson)
      operationId: getDeviceConfig
      parameters:
        - name: type
          in: query
          required: true
          schema:
            type: string
            enum: [macos, raspberry-pi, jetson, generic, other]
          description: Device type/platform
      responses:
        '200':
          description: Device configuration
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DeviceConfig'
        '404':
          $ref: '#/components/responses/NotFound'
        '403':
          $ref: '#/components/responses/Forbidden'
        '500':
          $ref: '#/components/responses/InternalError'
    put:
      tags: [devices]
      summary: Update device type configuration
      description: Update configuration for all devices of this type
      operationId: updateDeviceConfig
      parameters:
        - name: type
          in: query
          required: true
          schema:
            type: string
            enum: [macos, raspberry-pi, jetson, generic, other]
          description: Device type/platform
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [config]
              properties:
                config:
                  type: object
                  description: Full device configuration (tasks and sinks)
                changeDescription:
                  type: string
                  description: Optional description of what changed
      responses:
        '200':
          description: Configuration updated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DeviceConfig'
        '403':
          $ref: '#/components/responses/Forbidden'
        '500':
          $ref: '#/components/responses/InternalError'

  /api/config/device/history:
    get:
      tags: [devices]
      summary: Get device type configuration history
      description: Retrieve configuration change history for a device type
      operationId: getDeviceConfigHistory
      parameters:
        - name: type
          in: query
          required: true
          schema:
            type: string
            enum: [macos, raspberry-pi, jetson, generic, other]
          description: Device type/platform
        - name: limit
          in: query
          schema:
            type: integer
            default: 10
            maximum: 100
      responses:
        '200':
          description: Configuration history
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/ConfigHistory'
        '403':
          $ref: '#/components/responses/Forbidden'
        '500':
          $ref: '#/components/responses/InternalError'

  /api/config/device/rollback/{historyId}:
    post:
      tags: [devices]
      summary: Rollback device type configuration
      description: Restore a previous configuration version for a device type
      operationId: rollbackDeviceConfig
      parameters:
        - name: type
          in: query
          required: true
          schema:
            type: string
            enum: [macos, raspberry-pi, jetson, generic, other]
          description: Device type/platform
        - name: historyId
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Configuration rolled back
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DeviceConfig'
        '404':
          $ref: '#/components/responses/NotFound'
        '403':
          $ref: '#/components/responses/Forbidden'
        '500':
          $ref: '#/components/responses/InternalError'

  /api/config/framework:
    get:
      tags: [devices]
      summary: Get framework configuration
      description: Retrieve shared pipeline configuration
      operationId: getFrameworkConfig
      responses:
        '200':
          description: Framework configuration
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/FrameworkConfig'
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/InternalError'
    put:
      tags: [devices]
      summary: Update framework configuration
      description: Update shared pipeline configuration
      operationId: updateFrameworkConfig
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [config]
              properties:
                name:
                  type: string
                  default: default
                config:
                  type: object
                  description: Framework configuration (pipeline, sources, buffers)
                changeDescription:
                  type: string
      responses:
        '200':
          description: Configuration updated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/FrameworkConfig'
        '500':
          $ref: '#/components/responses/InternalError'

  /api/config/framework/history:
    get:
      tags: [devices]
      summary: Get framework configuration history
      description: Retrieve framework configuration change history
      operationId: getFrameworkConfigHistory
      parameters:
        - name: limit
          in: query
          schema:
            type: integer
            default: 10
            maximum: 100
      responses:
        '200':
          description: Configuration history
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/ConfigHistory'
        '500':
          $ref: '#/components/responses/InternalError'

  /api/devices/{deviceId}/snapshot:
    post:
      tags: [devices]
      summary: Request snapshot from device
      description: Request the device to capture and send a snapshot image. The snapshot will be delivered via WebSocket when ready.
      operationId: requestDeviceSnapshot
      parameters:
        - $ref: '#/components/parameters/DeviceId'
      responses:
        '202':
          description: Snapshot request accepted and sent to device. Snapshot will be delivered via WebSocket.
          content:
            application/json:
              schema:
                type: object
                required:
                  - accepted
                properties:
                  accepted:
                    type: boolean
                    example: true
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/InternalError'

  /api/chat/messages:
    get:
      tags: [chat]
      summary: Get chat messages
      description: Retrieve chat message history
      operationId: getChatMessages
      parameters:
        - name: deviceId
          in: query
          description: Filter by device ID
          schema:
            type: string
      responses:
        '200':
          description: Chat messages
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/ChatMessage'
        '500':
          $ref: '#/components/responses/InternalError'

  /api/chat/message:
    post:
      tags: [chat]
      summary: Send chat message
      description: Send a message to the AI and get a response
      operationId: sendChatMessage
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [message]
              properties:
                message:
                  type: string
                  example: "What do you see in this image?"
                deviceId:
                  type: string
                  format: uuid
                debug:
                  type: boolean
                  default: false
      responses:
        '200':
          description: Message sent and response received
          content:
            application/json:
              schema:
                type: object
                properties:
                  userMessage:
                    $ref: '#/components/schemas/ChatMessage'
                  aiMessage:
                    $ref: '#/components/schemas/ChatMessage'
        '500':
          $ref: '#/components/responses/InternalError'

  /api/schemas:
    get:
      tags: [schemas]
      summary: List all schemas
      description: Get metadata about available JSON schemas
      operationId: listSchemas
      responses:
        '200':
          description: Schema list
          content:
            application/json:
              schema:
                type: object
                properties:
                  schemas:
                    type: array
                    items:
                      type: object
                      properties:
                        topic:
                          type: string
                        version:
                          type: string
                        url:
                          type: string
        '500':
          $ref: '#/components/responses/InternalError'

  /api/schemas/{topic}/{version}/schema.json:
    get:
      tags: [schemas]
      summary: Get specific schema
      description: Retrieve a specific version of a JSON schema
      operationId: getSchema
      parameters:
        - name: topic
          in: path
          required: true
          schema:
            type: string
            example: alerts
        - name: version
          in: path
          required: true
          schema:
            type: string
            example: v1.0.0
      responses:
        '200':
          description: JSON Schema
          content:
            application/json:
              schema:
                type: object
        '404':
          description: Schema not found

  /api/devices/{deviceId}/metrics:
    get:
      tags: [metrics]
      summary: Get metrics configuration
      description: Retrieve the current metrics configuration for a device
      operationId: getMetricsConfig
      parameters:
        - $ref: '#/components/parameters/DeviceId'
      responses:
        '200':
          description: Metrics configuration
          content:
            application/json:
              schema:
                $ref: '../schemas/metrics-config-v1.0.0.json'
        '500':
          $ref: '#/components/responses/InternalError'

  /api/devices/{deviceId}/metrics/{session}:
    get:
      tags: [metrics]
      summary: Get metrics data
      description: Retrieve metrics data for a specific session
      operationId: getMetricsData
      parameters:
        - $ref: '#/components/parameters/DeviceId'
        - name: session
          in: path
          required: true
          description: Metrics session name
          schema:
            type: string
        - name: limit
          in: query
          description: Maximum number of data points
          schema:
            type: integer
            default: 100
            maximum: 1000
      responses:
        '200':
          description: Metrics data
          content:
            application/json:
              schema:
                type: object
                properties:
                  session:
                    type: string
                  data:
                    type: array
                    items:
                      $ref: '../schemas/metrics-data-v1.0.0.json'
        '500':
          $ref: '#/components/responses/InternalError'

  /api/devices/{deviceId}/metrics/subscribe:
    post:
      tags: [metrics]
      summary: Subscribe to metrics
      description: Request device to start publishing metrics data
      operationId: subscribeMetrics
      parameters:
        - $ref: '#/components/parameters/DeviceId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [session]
              properties:
                session:
                  type: string
                  description: Metrics session name
                interval_seconds:
                  type: number
                  default: 5
                  minimum: 1
      responses:
        '200':
          description: Subscription request sent
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  session:
                    type: string
                  interval_seconds:
                    type: number
        '503':
          description: MQTT not available

  /api/devices/{deviceId}/metrics/unsubscribe:
    post:
      tags: [metrics]
      summary: Unsubscribe from metrics
      description: Request device to stop publishing metrics data
      operationId: unsubscribeMetrics
      parameters:
        - $ref: '#/components/parameters/DeviceId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [session]
              properties:
                session:
                  type: string
      responses:
        '200':
          description: Unsubscribe request sent
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  session:
                    type: string
        '503':
          description: MQTT not available

  /api/search-terms:
    get:
      tags: [search]
      summary: List all search terms
      description: Retrieve all active search terms for the current user
      operationId: listSearchTerms
      security:
        - bearerAuth: []
      responses:
        '200':
          description: List of search terms
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/SearchTerm'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '500':
          $ref: '#/components/responses/InternalError'

    post:
      tags: [search]
      summary: Create search term
      description: |
        Create new search term from natural language query.
        Server parses via Groq API to generate filter vectors,
        saves to database, and broadcasts MQTT filter update to all devices.
      operationId: createSearchTerm
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [searchString]
              properties:
                searchString:
                  type: string
                  description: Natural language search query
                  minLength: 1
                  maxLength: 500
                  example: "person wearing red shirt"
      responses:
        '201':
          description: Search term created successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SearchTerm'
        '400':
          description: Invalid search string or parsing failed
          content:
            application/json:
              schema:
                type: object
                properties:
                  error:
                    type: string
                  details:
                    type: string
        '401':
          $ref: '#/components/responses/Unauthorized'
        '500':
          $ref: '#/components/responses/InternalError'

  /api/search-terms/{id}:
    get:
      tags: [search]
      summary: Get search term details
      description: Retrieve specific search term with full filter configuration
      operationId: getSearchTerm
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
          description: Search term ID
      responses:
        '200':
          description: Search term details
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SearchTerm'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/InternalError'

    delete:
      tags: [search]
      summary: Delete search term
      description: |
        Remove search term from database and broadcast updated MQTT filter
        to all devices (without this term).
      operationId: deleteSearchTerm
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
          description: Search term ID
      responses:
        '200':
          description: Search term deleted successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    example: true
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/InternalError'

  /api/search-terms/detections:
    get:
      tags: [search]
      summary: List all detections
      description: |
        Retrieve detection audit log entries across all search terms.
        Supports pagination and filtering by device, date range, etc.
      operationId: listDetections
      security:
        - bearerAuth: []
      parameters:
        - name: limit
          in: query
          schema:
            type: integer
            minimum: 1
            maximum: 100
            default: 50
          description: Maximum number of results to return
        - name: offset
          in: query
          schema:
            type: integer
            minimum: 0
            default: 0
          description: Offset for pagination
        - name: deviceId
          in: query
          schema:
            type: string
          description: Filter by specific device
        - name: searchTermId
          in: query
          schema:
            type: string
            format: uuid
          description: Filter by specific search term
        - name: startDate
          in: query
          schema:
            type: string
            format: date-time
          description: Filter detections after this timestamp
        - name: endDate
          in: query
          schema:
            type: string
            format: date-time
          description: Filter detections before this timestamp
      responses:
        '200':
          description: List of detections with pagination metadata
          content:
            application/json:
              schema:
                type: object
                properties:
                  detections:
                    type: array
                    items:
                      $ref: '#/components/schemas/DetectionAudit'
                  total:
                    type: integer
                    description: Total number of matching detections
                  limit:
                    type: integer
                  offset:
                    type: integer
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/InternalError'

  /api/search-terms/{id}/detections:
    get:
      tags: [search]
      summary: List detections for search term
      description: Retrieve detection audit log entries for a specific search term
      operationId: listSearchTermDetections
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
          description: Search term ID
        - name: limit
          in: query
          schema:
            type: integer
            minimum: 1
            maximum: 100
            default: 50
        - name: offset
          in: query
          schema:
            type: integer
            minimum: 0
            default: 0
        - name: deviceId
          in: query
          schema:
            type: string
        - name: startDate
          in: query
          schema:
            type: string
            format: date-time
        - name: endDate
          in: query
          schema:
            type: string
            format: date-time
      responses:
        '200':
          description: List of detections for this search term
          content:
            application/json:
              schema:
                type: object
                properties:
                  detections:
                    type: array
                    items:
                      $ref: '#/components/schemas/DetectionAudit'
                  total:
                    type: integer
                  limit:
                    type: integer
                  offset:
                    type: integer
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/InternalError'

  # ============================================================
  # Admin Endpoints - Device and Service Management
  # ============================================================
  /api/admin/devices:
    get:
      tags: [admin]
      summary: List all devices (admin)
      description: Returns all devices in the system (admin-only, bypasses user filtering)
      operationId: adminListDevices
      responses:
        '200':
          description: List of all devices
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '../schemas/admin-device-v1.0.0.json'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '500':
          $ref: '#/components/responses/InternalError'
    
    post:
      tags: [admin]
      summary: Create a new device (admin)
      description: Manually create a device record (manufacturing/provisioning)
      operationId: adminCreateDevice
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '../schemas/admin-device-create-v1.0.0.json'
      responses:
        '201':
          description: Device created successfully
          content:
            application/json:
              schema:
                $ref: '../schemas/admin-device-v1.0.0.json'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '500':
          $ref: '#/components/responses/InternalError'

  /api/admin/devices/{deviceId}:
    patch:
      tags: [admin]
      summary: Update device (admin)
      description: Update device properties (admin-only)
      operationId: adminUpdateDevice
      parameters:
        - $ref: '#/components/parameters/DeviceId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '../schemas/admin-device-update-v1.0.0.json'
      responses:
        '200':
          description: Device updated successfully
          content:
            application/json:
              schema:
                $ref: '../schemas/admin-device-v1.0.0.json'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/InternalError'
    
    delete:
      tags: [admin]
      summary: Delete device (admin)
      description: Delete a device from the system (admin-only)
      operationId: adminDeleteDevice
      parameters:
        - $ref: '#/components/parameters/DeviceId'
      responses:
        '200':
          description: Device deleted successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/InternalError'

  /api/admin/services:
    get:
      tags: [admin]
      summary: List infrastructure services (admin)
      description: Returns status of all infrastructure services (MQTT, DB, Redis, WebSocket)
      operationId: adminListServices
      responses:
        '200':
          description: List of infrastructure services
          content:
            application/json:
              schema:
